name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-snowflake==1.11.6

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          softcart:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ACCOUNTADMIN
                database: softcart_db
                warehouse: softcart_wh
                schema: staging
                threads: 4
          EOF

      - name: dbt deps
        run: dbt deps || true

      - name: dbt compile
        run: dbt compile --project-dir . --profiles-dir ~/.dbt

  dag-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check Python syntax
        run: python -m py_compile airflow/dags/softcart_pipeline.py

      - name: Install Airflow for DAG validation
        run: pip install apache-airflow==2.10.4 apache-airflow-providers-snowflake==5.8.1 faker azure-storage-file-datalake
      - name: Validate DAG loads without errors
        run: |
          export AIRFLOW_HOME=/tmp/airflow_ci
          mkdir -p $AIRFLOW_HOME/dags
          cp airflow/dags/softcart_pipeline.py $AIRFLOW_HOME/dags/
          airflow db init
          python -c "
          from airflow.models import DagBag
          db = DagBag(dag_folder='$AIRFLOW_HOME/dags', include_examples=False)
          if db.import_errors:
              print('DAG import errors found:')
              for filename, error in db.import_errors.items():
                  print(f'{filename}: {error}')
              exit(1)
          else:
              print(f'Successfully loaded {len(db.dags)} DAG(s), no errors.')
          "
dbt-docs:
    runs-on: ubuntu-latest
    needs: dbt-compile
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-snowflake==1.11.6

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          softcart:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ACCOUNTADMIN
                database: softcart_db
                warehouse: softcart_wh
                schema: staging
                threads: 4
          EOF

      - name: dbt deps
        run: dbt deps || true

      - name: Generate dbt docs
        run: dbt docs generate --project-dir . --profiles-dir ~/.dbt

      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target