version: 2

models:
  - name: dim_customers
    config:
      materialized: table
      schema: marts
  - name: dim_products
    config:
      materialized: table
      schema: marts
  - name: fct_orders
    config:
      materialized: table
      schema: marts
  - name: fct_clickstream_events
    config:
      materialized: incremental
      schema: marts
  - name: fct_returns_analysis
    config:
      materialized: table
      schema: marts
  - name: fct_customer_rfm
    config:
      materialized: table
      schema: marts
  - name: fct_returns
    config:
      materialized: table
      schema: marts
    columns:
      - name: return_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: product_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id